<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Form</title>
</head>
<body>
    <h1>Student Information Form</h1>

    <form action="#" method="post">
    <fieldset>
       <legend>Personal Information</legend><br>
       <label>Full Name:&nbsp;&nbsp;&nbsp;</label>
       <input type="text" name="full name" id="fullName" placeholder="Enter your name"><br><br>
       <label>Roll No: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
       <input type="text" name="roll no" id="roll no" placeholder="Enter your roll no"><br><br>
       <label>Contact No:&nbsp;</label>
       <input type="text" name="contact no" id="contact no" placeholder="Enter your contact no"><br><br>
    </fieldset>

    <fieldset>
       <legend>Subjects</legend><br>
      <input type="checkbox" name="Subjects" value="html">HTML <br>
      <input type="checkbox" name="subjects" value="CSS"> CSS<br>
      <input type="checkbox" name="subjects" value="JavaScript"> JavaScript<br>
      <input type="checkbox" name="subjects" value="Web Development"> Web Development<br><br>
    </fieldset>  

    <fieldset>
      <legend>Semester:</legend><br>
        <select name="semester">
            <option>Semester 1</option>
            <option>Semester 2</option>
            <option>Semester 3</option>
            <option>Semester 4</option>
            <option>Semester 5</option>
            <option>Semester 6</option>
        </select><br><br>
    </fieldset>
      
    <fieldset>
      <legend>Discipline</legend><br>
      <select name="Discipline">
        <option>BSCS</option>
        <option>BSIT</option>
        <option>BSSE</option>
        <option>BSEE</option>
      </select><br><br>
    </fieldset><br>
      
      <input type="submit" value="Submit">
    </form>

</body>
</html>
